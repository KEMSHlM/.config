# Hyprland idle daemon: blank the display after inactivity.
# No suspend / hibernate — lan-mouse keeps running so the Mac can wake
# the screen with a cursor edge-handover or any forwarded keystroke.

general {
    # Avoid firing while a media player is playing fullscreen, etc.
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# 10 minutes -> turn the displays off.
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
