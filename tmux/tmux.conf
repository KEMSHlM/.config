## my settings
# OS が Darwin の時は pbcopy を使う
if-shell -b '[ "$(uname)" = "Darwin" ]' {
  set -s copy-command "pbcopy"
}

# true color
set -g default-terminal "xterm-kitty"
set -ag terminal-overrides ",xterm-kitty:RGB"
set -a terminal-features ',xterm-kitty:RGB'

# clipboard
set -g set-clipboard on
set -g allow-passthrough all

# Forward kitty environment variables into tmux sessions
set -ga update-environment "TERM"
set -ga update-environment "TERM_PROGRAM"
set -ga update-environment "KITTY_PID"
set -ga update-environment "KITTY_WINDOW_ID"
set -ga update-environment "SNACKS_KITTY"

## my prefix
unbind C-b
set -g prefix C-t
set -g mouse on
setw -g mode-keys vi
set -g renumber-windows on
set -g status-position bottom

## pane styling
set -g pane-active-border-style 'fg=colour208,bg=default'
set -g pane-border-style 'fg=colour235,bg=default'

## tmux plugin manager
TMUX_PLUGIN_MANAGER_PATH="~/.local/share/tmux/plugins"

## catppuccin — load before status settings
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'slanted'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_text '#W'
run ~/.local/share/tmux/plugins/catppuccin/tmux/catppuccin.tmux

## status bar — set AFTER catppuccin loads
set -g status-style "bg=#0f0f18"
set -g status-left ''
set -g status-right "#[fg=#342d44,bg=#0f0f18]▐#[fg=#5a4b71,bg=#342d44]▐#[fg=#7f699d,bg=#5a4b71]▐#[fg=#a587ca,bg=#7f699d]▐#[fg=#cba6f7,bg=#a587ca]▐#[fg=#0f0f18,bg=#cba6f7,bold] #S "
set -g status-left-length 100
set -g status-right-length 100

# ▐▌ half-block gradient tabs
set -g window-status-format "#[fg=#cdd6f4,bg=#0f0f18] #W "
set -g window-status-current-format "#[fg=#6e5b89,bg=#0f0f18]▐#[fg=#9c80c0,bg=#6e5b89]▐#[fg=#cba6f7,bg=#9c80c0]▐#[fg=#0f0f18,bg=#cba6f7,bold,italics] #W #[fg=#cba6f7,bg=#9c80c0]▌#[fg=#9c80c0,bg=#6e5b89]▌#[fg=#6e5b89,bg=#0f0f18]▌"
set -g window-status-separator ""

# load other plugins settings
source "~/.config/tmux/plugins.conf"
source "~/.config/tmux/keyconfig.conf"

# plugins (TPM)
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'pschmitt/tmux-pain-control'
set -g @plugin 'KEMSHlM/tmux-ssh-split'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'tmux-plugins/tpm'

run "${TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm"
