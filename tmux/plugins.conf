## highlight

set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
# write-test

## tmux-ssh-split
set-option -g @ssh-split-h-key '|'
set-option -g @ssh-split-v-key '_'
set-option -g @ssh-split-w-key 'c'
set-option -g @ssh-split-keep-cwd "true"
set-option -g @ssh-split-keep-remote-cwd "true"
set-option -g @ssh-split-no-shell "true"
set-option -g @ssh-split-strip-cmd "true"
set-option -g @ssh-split-verbose "true"
set-option -g @ssh-split-debug "true"

## tmux-claude
set -g @claude-launch-key 'o'
set -g @claude-resume-key 'O'
set -g @claude-switch-key 'space'
set -g @claude-suppress-keys 'w'
set -g @claude-notify-type 'popup'
