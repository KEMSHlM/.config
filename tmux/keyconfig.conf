## my shortcut
# bind e kill-pane -a
bind C-d detach-client
bind r source-file $TMUX_CONF_DIR/tmux.conf \; display "Reloaded!"

# copy mode
bind t copy-mode
# Start selection with 'v'
bind -T copy-mode-vi v send-keys -X begin-selection
# Copy to clipboard with 'y'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
# input session name & make a new session
bind-key C command-prompt -p "Name of new session: " "new-session -s '%%'"
# delete session with confirmation
bind-key x confirm-before -p "Kill session #S? (y/n)" "run-shell 'tmux switch-client -n \\\; kill-session -t \"#S\"'"
# delete session with confirmation
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  "perl -0777 -pe 's/(?<=[^\n])\n(?=[^\n])/ /g' | wl-copy"

bind a run-shell '$TMUX_CONF_DIR/claude-launch.sh "#{pane_current_command}" "#{pane_pid}" "#{pane_current_path}" "#{pane_path}" "#{session_name}" "#{pane_tty}"'
bind A run-shell '$TMUX_CONF_DIR/claude-launch.sh "#{pane_current_command}" "#{pane_pid}" "#{pane_current_path}" "#{pane_path}" "#{session_name}" "#{pane_tty}" "--resume"'
bind O if -F '#{==:#{session_name},claude}' \
  'run-shell "touch /tmp/claude-popup-switch && tmux detach-client"' \
  'display-popup -w80% -h70% -E "$TMUX_CONF_DIR/claude-switch.sh"'
