# Font
font_family      Hack Nerd Font
bold_font        Hack Nerd Font Bold
italic_font      Hack Nerd Font Italic
bold_italic_font Hack Nerd Font Bold Italic
font_size        16.0

# Window
window_padding_width 2 8
background_opacity   0.8
hide_window_decorations yes

# Mouse
mouse_hide_wait 3.0

# Shell (tmux via startup script)
shell /bin/zsh -l -c "~/.config/kitty/start-tmux.sh"

# Terminal
term xterm-kitty

# Colors (One Dark)
foreground #abb2bf
background #282c34

# Keybindings
# Ctrl+D -> delete word (send ^W)
map ctrl+d send_text all \x17
# Ctrl+E -> forward word (send ESC f)
map ctrl+e send_text all \x1bf
# Ctrl+B -> backward word (send ESC b)
map ctrl+b send_text all \x1bb
# Shift+Enter -> send ESC + CR (for Claude Code)
map shift+enter send_text all \x1b\r

# Image rendering (kitty graphics protocol)
allow_remote_control yes
listen_on unix:/tmp/kitty

# Clipboard
clipboard_control write-clipboard write-primary read-clipboard read-primary
